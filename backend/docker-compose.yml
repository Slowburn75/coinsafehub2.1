services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: coinsafe
      POSTGRES_PASSWORD: coinsafe
      POSTGRES_DB: coinsafehub
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U coinsafe -d coinsafehub']
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - '8025:8025'
      - '1025:1025'
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATA_FILE: /data/mailpit.db
    volumes:
      - mailpit_data:/data

  api:
    build: .
    ports:
      - '3002:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://coinsafe:coinsafe@postgres:5432/coinsafehub?schema=public
      JWT_SECRET: docker-dev-secret-change-in-production
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_USER: ''
      SMTP_PASS: ''
      EMAIL_FROM: noreply@coinsafehub.com
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  mailpit_data:
